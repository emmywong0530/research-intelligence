name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "spike/**"

jobs:
  schemas:
    name: JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install jsonschema==4.26.0
      - run: python scripts/validate_schemas.py

  frontend:
    name: Frontend Lint Typecheck Test Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: corepack enable
      - run: corepack prepare pnpm@11.9.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm frontend:lint
      - run: pnpm frontend:typecheck
      - run: pnpm frontend:test
      - run: pnpm frontend:build
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: pnpm frontend:e2e

  companion:
    name: Companion Lint Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e "companion[dev]"
      - run: python -m ruff check companion/src companion/tests
      - run: python -m pytest companion/tests

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: corepack enable
      - run: corepack prepare pnpm@11.9.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level moderate
      - run: python -m pip install pip-audit==2.10.1
      - run: python -m pip_audit --requirement companion/requirements-dev.txt

  pwa-loopback-spike:
    name: PWA Loopback Spike
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: corepack enable
      - run: corepack prepare pnpm@11.9.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install -e "companion[dev]"
      - run: pnpm frontend:build
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: PYTHON_BIN=python PNPM_BIN=pnpm pnpm spike:pwa-loopback
